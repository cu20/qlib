qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn
market: &market csi300
benchmark: &benchmark SH000300

data_handler_config: &data_handler_config
    start_time: 2008-01-01
    end_time: 2020-08-01
    fit_start_time: 2008-01-01
    fit_end_time: 2014-12-31
    instruments: *market
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label
    label: ["Ref($close, -5) / Ref($close, -1) - 1"]

market_data_handler_config: &market_data_handler_config
    start_time: 2008-01-01
    end_time: 2020-08-01
    fit_start_time: 2008-01-01
    fit_end_time: 2014-12-31
    instruments: *market
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature

port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 30           # 持有 30 只，保证分散度
            n_drop: 1          # 每日最多换 1 只，极低换手，年化摩擦成本 ≈ 1.5%
    backtest:
        start_time: 2017-01-01
        end_time: 2020-08-01
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            deal_price: close
            open_cost: 0.0005  # 买入手续费 0.05%
            close_cost: 0.0015 # 卖出手续费 0.05% + 印花税 0.1%
            min_cost: 5
            limit_threshold: 0.095

task:
    model:
        class: WaveFormerQlibModel
        module_path: qlib.contrib.model.waveformer_ts
        kwargs:
            seed: 0
            n_epochs: 10
            lr: 0.00001
            train_stop_loss_thred: 0.95
            d_feat: 158
            d_model: 256
            t_nhead: 4
            s_nhead: 2
            gate_input_start_index: 158
            gate_input_end_index: 221
            beta: 5
            save_prefix: *market
            # GPU-native wavelet denoising（优化：BayesShrink + 轻量 blend）
            use_wavelet_denoise: true
            wavelet: "haar"
            denoise_level: 1
            threshold_mode: "soft"
            threshold_method: "bayes"  # BayesShrink 比 VisuShrink 更保守
            threshold_scale: 0.3       # 轻量去噪
            denoise_blend: 0.25        # 0.75*raw + 0.25*denoised，减轻过度去噪
            denoise_finest_only: true  # 仅最细层阈值，保留粗层趋势
            level_dependent_scale: true # 粗层更小阈值
            use_edge_pad: true         # 论文：边缘复制填充，减少边界失真
            use_boundary_smooth: true # 默认关闭（短期易过度平滑）
            boundary_smooth_win: 1    # 边界平滑半窗长（1=3点）
    dataset:
        class: MASTERTSDatasetH
        module_path: qlib.contrib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2008-01-01, 2014-12-31]
                valid: [2015-01-01, 2016-12-31]
                test:  [2017-01-01, 2020-08-01]
            step_len: 8
            market_data_handler_config: *market_data_handler_config
    record:
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs:
              model: <MODEL>
              dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
              ana_long_short: False
              ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs:
              config: *port_analysis_config
