qlib_init:
    provider_uri: "~/.qlib/qlib_data/cn_data"
    region: cn
market: &market csi300
benchmark: &benchmark SH000300
data_handler_config: &data_handler_config
    start_time: 2008-01-01
    end_time: 2020-08-01
    fit_start_time: 2008-01-01
    fit_end_time: 2014-12-31
    instruments: *market
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature
    learn_processors:
        - class: DropnaLabel
        - class: CSRankNorm
          kwargs:
              fields_group: label
    label: ["Ref($close, -5) / Ref($close, -1) - 1"] 
market_data_handler_config: &market_data_handler_config
    start_time: 2008-01-01
    end_time: 2020-08-01
    fit_start_time: 2008-01-01
    fit_end_time: 2014-12-31
    instruments: *market
    infer_processors:
        - class: RobustZScoreNorm
          kwargs:
              fields_group: feature
              clip_outlier: true
        - class: Fillna
          kwargs:
              fields_group: feature
port_analysis_config: &port_analysis_config
    strategy:
        class: TopkDropoutStrategy
        module_path: qlib.contrib.strategy
        kwargs:
            signal: <PRED>
            topk: 30           # 仍持有 30 只，保证分散度
            n_drop: 3          # 每个调仓日最多换 3 只
            hold_thresh: 10    # 至少持有 10 个交易日才允许卖出
            risk_degree: 0.8   # 使用 80% 资金建仓，降低仓位波动
            method_buy: top
            method_sell: bottom
    backtest:
        start_time: 2017-01-01
        end_time: 2020-08-01
        account: 100000000
        benchmark: *benchmark
        exchange_kwargs:
            deal_price: close
task:
    model:
        class: WaveFormerQlibModel
        module_path: qlib.contrib.model.waveformer_ts
        kwargs:
            seed: 0
            n_epochs: 10
            lr: 0.00001
            train_stop_loss_thred: 0.95
            d_feat: 158
            d_model: 256
            t_nhead: 4
            s_nhead: 2
            gate_input_start_index: 158
            gate_input_end_index: 221
            beta: 5
            save_prefix: *market
            # 小波去噪（默认关闭，由 main_waveformer.py 的消融逻辑动态开启）
            use_wavelet_denoise: false
            wavelet: "haar"
            denoise_level: 1
            threshold_method: "bayes"
            threshold_mode: "soft"
            threshold_scale: 0.3
            denoise_blend: 0.25
            denoise_finest_only: true
            level_dependent_scale: true
            use_edge_pad: true
            use_boundary_smooth: false
            boundary_smooth_win: 1
    dataset:
        class: MASTERTSDatasetH
        module_path: qlib.contrib.data.dataset
        kwargs:
            handler:
                class: Alpha158
                module_path: qlib.contrib.data.handler
                kwargs: *data_handler_config
            segments:
                train: [2008-01-01, 2014-12-31]
                valid: [2015-01-01, 2016-12-31]
                test: [2017-01-01, 2020-08-01]
            step_len: 8
            market_data_handler_config: *market_data_handler_config
    record: 
        - class: SignalRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            model: <MODEL>
            dataset: <DATASET>
        - class: SigAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            ana_long_short: False
            ann_scaler: 252
        - class: PortAnaRecord
          module_path: qlib.workflow.record_temp
          kwargs: 
            config: *port_analysis_config

